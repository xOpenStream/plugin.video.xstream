name: Protect Workflow Changes

on:
  pull_request:
    branches: [nightly, main]
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  check-workflow-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if any workflow files changed
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^\\.github/workflows/' || true)
          
          if [ -n "$CHANGED" ]; then
            echo "Workflow change detected:"
            echo "$CHANGED"
            echo ""
            echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
            echo "Admin-Review required"
            echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
            exit 1
          else
            echo "no change on workflow"
            exit 0
          fi

      - name: Summary (optional – nur Info)
        if: always()
        run: |
          echo "Workflow-Protection-Check: ${{ job.status }}"
